name: cloe-desktop
version: 1.0.0
description: "Cloe Desktop companion — mirrors agent state, tool activity, and conversation context to the desktop character widget via HTTP API."
author: "JakimLi & Cloe"
hooks:
  - pre_tool_call
  - post_tool_call
  - pre_llm_call
  - post_llm_call
  - post_api_request
  - on_session_start
  - on_session_end
  - on_session_reset
  - subagent_stop
